# nginx/default.conf — Reverse proxy CDM 2026 Tracker
#
# Phase 1 (HTTP uniquement) : décommenter le bloc "server 443" et commenter
# le redirect 301 une fois le certificat Let's Encrypt obtenu.
# Commande pour obtenir le certificat :
#   docker compose run --rm certbot certonly --webroot \
#     --webroot-path /var/www/certbot \
#     -d votre-domaine.com --email votre@email.com --agree-tos

upstream app {
    server app:3000;
    keepalive 16;
}

# ---- Compression gzip ----------------------------------------
gzip            on;
gzip_vary       on;
gzip_proxied    any;
gzip_comp_level 5;
gzip_types      text/plain text/css application/json
                application/javascript text/javascript
                image/svg+xml;

# ---- HTTP — redirection vers HTTPS (ou serveur direct) --------
server {
    listen      80;
    server_name _;   # remplacer par votre domaine en production

    # Challenge Let's Encrypt (ACME)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # En production avec SSL : décommenter la ligne suivante
    # et commenter le bloc location / ci-dessous
    # return 301 https://$host$request_uri;

    # Sans SSL (développement / première mise en prod) :
    location / {
        proxy_pass         http://app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Cache navigateur pour les assets statiques (JS/CSS/images)
        location ~* \.(js|css|png|svg|ico|woff2?)$ {
            proxy_pass http://app;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}

