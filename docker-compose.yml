services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cdm2026
      POSTGRES_USER: cdm
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdm -d cdm2026"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  app:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
    ports: ["3001:3000"]
    environment:
      PORT: 3000
      PG_HOST: db
      PG_PORT: 5432
      PG_DB: cdm2026
      PG_USER: cdm
      PG_PASSWORD: ${PG_PASSWORD}
      TOKEN_SECRET: ${TOKEN_SECRET}
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    networks: [internal]

volumes:
  pgdata:
networks:
  internal:
